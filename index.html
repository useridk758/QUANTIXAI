<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTIXAI</title>
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com">
    <script src="https://accounts.google.com" async defer></script>
    <style>
        /* 1. UNIVERSAL TRANSITIONS */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        body, html { height: 100%; overflow: hidden; background: #000; color: #fff; }

        /* HERO SECTION */
        .hero { 
            height: 100vh; width: 100%; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            background: linear-gradient(-45deg, #0d0221, #0f0c29, #24243e, #000); 
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; 
            position: absolute; z-index: 10;
        }
        .hero.fade-out { opacity: 0; visibility: hidden; transform: scale(1.1); }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* MODALS */
        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); 
            z-index: 1000; justify-content: center; align-items: center; opacity: 0;
        }
        .overlay.active { display: flex; opacity: 1; }

        .form-box { 
            background: #050505; padding: 50px; border-radius: 24px; width: 420px; 
            text-align: center; border: 1px solid #1a1a1a; transform: translateY(20px);
        }
        .overlay.active .form-box { transform: translateY(0); }

        input { 
            width: 100%; padding: 18px; margin-bottom: 15px; background: #0f0f0f; 
            border: 1px solid #222; color: white; border-radius: 10px; outline: none; 
        }
        input:focus { border-color: #fff; }

        .submit-btn { 
            width: 100%; background: #fff; color: #000; border: none; padding: 18px; 
            font-weight: 800; border-radius: 10px; cursor: pointer; 
        }
        .submit-btn:hover { transform: scale(1.03); background: #ddd; }

        /* CHAT SECTION */
        #chatSection { 
            display: none; height: 100vh; width: 100%; opacity: 0; transform: translateY(10px);
        }
        #chatSection.active { display: block; opacity: 1; transform: translateY(0); }

        .sidebar { 
            width: 280px; height: 100%; background: #050505; border-right: 1px solid #1a1a1a; 
            display: flex; flex-direction: column; padding: 20px; 
        }

        /* RECENT CHATS WITH DELETE */
        .chat-item { 
            position: relative; padding: 12px; margin-bottom: 8px; border-radius: 8px; 
            font-size: 0.9rem; cursor: pointer; color: #888; background: transparent;
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-item:hover { background: #111; color: #fff; }
        .del-btn { 
            opacity: 0; color: #ff4d4d; font-size: 18px; padding: 0 5px; 
            transition: 0.2s;
        }
        .chat-item:hover .del-btn { opacity: 1; }

        .new-chat-btn { 
            background: #111; border: 1px solid #222; color: #fff; padding: 15px; 
            border-radius: 12px; cursor: pointer; font-weight: 600; margin-top: auto;
        }

        .chat-window { flex-grow: 1; display: flex; flex-direction: column; background: #080808; }
        #chatMessages { 
            flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; 
            flex-direction: column; gap: 20px; scroll-behavior: smooth;
        }
        .msg { 
            max-width: 70%; padding: 16px 22px; border-radius: 18px; line-height: 1.6; 
            opacity: 0; transform: translateY(10px); animation: msgFadeIn 0.5s forwards;
        }
        @keyframes msgFadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .user-msg { align-self: flex-end; background: #fff; color: #000; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #111; border: 1px solid #1a1a1a; color: #fff; border-bottom-left-radius: 2px; }

        .chat-input-area { padding: 30px 100px; display: flex; gap: 15px; }
        #userChatInput { 
            flex-grow: 1; background: #0f0f0f; border: 1px solid #222; 
            color: #fff; padding: 18px; border-radius: 15px; 
        }

        /* CONFIRMATION POPUP */
        #confirmPopup {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center;
            opacity: 0;
        }
        #confirmPopup.active { display: flex; opacity: 1; }
    </style>
</head>
<body>

    <!-- HERO -->
    <div id="introHero" class="hero">
        <nav style="position: absolute; top: 40px; right: 40px;">
            <button class="nav-btn" onclick="openModal('login')" style="background:none; border:1px solid #333; color:#fff; padding:10px 20px; cursor:pointer; border-radius:8px;">LOG IN</button>
            <button class="nav-btn" onclick="openModal('signup')" style="background:#fff; color:#000; border:none; padding:10px 20px; cursor:pointer; border-radius:8px; margin-left:10px;">SIGN UP</button>
        </nav>
        <h1 style="letter-spacing: 20px; font-weight: 200; font-size: 5rem;">QUANTIXAI</h1>
        <p style="letter-spacing: 5px; opacity: 0.4;">NEURAL INTERFACE ONLINE</p>
    </div>

    <!-- LOGIN/SIGNUP OVERLAY -->
    <div id="modalOverlay" class="overlay">
        <div id="loginBox" class="form-box" style="display:none;">
            <h2 style="margin-bottom:30px;">LOGIN</h2>
            <div id="loginError" style="color:red; display:none; margin-bottom:10px;">Sorry, no account connected to QUANTIXAI.</div>
            <input type="text" id="userIn" placeholder="Username">
            <input type="password" id="passIn" placeholder="Password">
            <button class="submit-btn" onclick="attemptLogin()">ACCESS SYSTEM</button>
            <p onclick="closeModal()" style="margin-top:20px; cursor:pointer; opacity:0.5; font-size:12px;">CANCEL</p>
        </div>
        <div id="signupBox" class="form-box" style="display:none;">
            <h2 style="margin-bottom:30px;">SIGN UP</h2>
            <div id="g_id_onload" data-client_id="YOUR_CLIENT_ID" data-callback="onGoogleSign"></div>
            <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large"></div>
            <p onclick="closeModal()" style="margin-top:20px; cursor:pointer; opacity:0.5; font-size:12px;">CANCEL</p>
        </div>
    </div>

    <!-- NEW CHAT CONFIRMATION -->
    <div id="confirmPopup" class="overlay">
        <div class="form-box" style="width: 300px;">
            <p style="margin-bottom:20px;">Clear current session?</p>
            <div style="display:flex; gap:10px;">
                <button class="submit-btn" onclick="confirmNewChat(true)">YES</button>
                <button class="submit-btn" style="background:#222; color:#fff;" onclick="confirmNewChat(false)">NO</button>
            </div>
        </div>
    </div>

    <!-- CHAT SECTION -->
    <div id="chatSection">
        <div style="display: flex; height: 100%;">
            <div class="sidebar">
                <p style="font-size: 0.7rem; letter-spacing: 2px; color: #444; margin-bottom: 20px;">HISTORY</p>
                <div class="recent-chats" id="recentChats">
                    <div class="chat-item">Welcome Session <span class="del-btn" onclick="this.parentElement.remove()">×</span></div>
                </div>
                <button class="new-chat-btn" onclick="askNewChat()">+ New Chat</button>
            </div>
            <div class="chat-window">
                <div id="chatMessages">
                    <div class="msg ai-msg">QUANTIXAI online. How can I assist?</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="userChatInput" placeholder="Enter query..." onkeydown="if(event.key==='Enter') sendMessage()">
                </div>
            </div>
        </div>
    </div>

    <script>
        function openModal(type) {
            const over = document.getElementById('modalOverlay');
            over.style.display = 'flex';
            setTimeout(() => over.classList.add('active'), 10);
            document.getElementById('loginBox').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('signupBox').style.display = type === 'signup' ? 'block' : 'none';
        }
        function closeModal() {
            const over = document.getElementById('modalOverlay');
            over.classList.remove('active');
            setTimeout(() => over.style.display = 'none', 500);
        }

        function attemptLogin() {
            if (document.getElementById('userIn').value === "gandon" && document.getElementById('passIn').value === "kunel12345") {
                document.getElementById('introHero').classList.add('fade-out');
                closeModal();
                setTimeout(() => {
                    document.getElementById('introHero').style.display = 'none';
                    const chat = document.getElementById('chatSection');
                    chat.style.display = 'block';
                    setTimeout(() => chat.classList.add('active'), 50);
                }, 600);
            } else { document.getElementById('loginError').style.display = 'block'; }
        }

        function askNewChat() {
            const pop = document.getElementById('confirmPopup');
            pop.style.display = 'flex';
            setTimeout(() => pop.classList.add('active'), 10);
        }

        function confirmNewChat(yes) {
            const pop = document.getElementById('confirmPopup');
            pop.classList.remove('active');
            if (yes) {
                const box = document.getElementById('chatMessages');
                box.style.opacity = '0';
                setTimeout(() => {
                    box.innerHTML = '<div class="msg ai-msg">System reset. New session active.</div>';
                    box.style.opacity = '1';
                }, 500);
            }
            setTimeout(() => pop.style.display = 'none', 500);
        }

        function sendMessage() {
            const input = document.getElementById('userChatInput');
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, 'user-msg');
            input.value = '';
            
            setTimeout(() => {
                let response = "Input not recognized. Specify query.";
                const low = text.toLowerCase();
                if (low.includes("name")) response = "I am QUANTIXAI.";
                else if (low.includes("do")) response = "I compute solutions and answer data-driven queries.";
                else if (low.includes("hi")) response = "Hello User.";
                else {
                    try { 
                        const res = eval(text.replace(/[^-()\d/*+.]/g, ''));
                        if (res !== undefined) response = `Result: ${res}`;
                    } catch(e) {}
                }
                addMessage(response, 'ai-msg');
            }, 800);
        }

        function addMessage(t, c) {
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.innerText = t;
            document.getElementById('chatMessages').appendChild(d);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }
        function onGoogleSign(r) { console.log("Google Auth Success"); }
    </script>
</body>
</html>
