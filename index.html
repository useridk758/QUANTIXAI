<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTIXAI</title>
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com">
    <script src="https://accounts.google.com" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        body, html { height: 100%; overflow: hidden; background: #000; color: #fff; }

        /* Login Screen Styles */
        .hero { height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(-45deg, #0d0221, #0f0c29, #24243e, #000); background-size: 400% 400%; animation: gradientBG 15s ease infinite; position: absolute; z-index: 10; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        nav { position: absolute; top: 0; right: 0; padding: 40px; display: flex; gap: 20px; z-index: 100; }
        .nav-btn { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 12px 28px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .nav-btn:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.2); }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(30px); z-index: 1000; justify-content: center; align-items: center; }
        .form-box { background: #050505; padding: 50px; border-radius: 24px; width: 420px; text-align: center; border: 1px solid #1a1a1a; }
        input { width: 100%; padding: 18px; margin-bottom: 15px; background: #0f0f0f; border: 1px solid #222; color: white; border-radius: 10px; outline: none; }
        #loginError { color: #ff3333; font-size: 0.9rem; margin-bottom: 15px; display: none; }
        .submit-btn { width: 100%; background: #fff; color: #000; border: none; padding: 18px; font-weight: 800; border-radius: 10px; cursor: pointer; }

        /* Chat Section Styles */
        #chatSection { display: none; height: 100vh; width: 100%; position: relative; z-index: 20; background: #0a0a0a; }
        .sidebar { width: 260px; height: 100%; background: #050505; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 20px; }
        .recent-chats { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; }
        .chat-item { padding: 10px; margin-bottom: 5px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item:hover { background: #1a1a1a; color: #fff; }
        .new-chat-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; text-align: left; cursor: pointer; font-weight: 600; width: 100%; }
        .new-chat-btn:hover { border-color: #555; background: #222; }

        .chat-window { flex-grow: 1; display: flex; flex-direction: column; background: #0a0a0a; }
        #chatMessages { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 70%; padding: 15px 20px; border-radius: 15px; line-height: 1.5; }
        .user-msg { align-self: flex-end; background: #222; color: #fff; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #111; border: 1px solid #1a1a1a; border-bottom-left-radius: 2px; }
        .chat-input-area { padding: 30px 100px; display: flex; gap: 15px; }
        #userChatInput { flex-grow: 1; background: #111; border: 1px solid #222; color: #fff; padding: 18px; border-radius: 12px; }
    </style>
</head>
<body>

    <!-- INTRO SECTION -->
    <div id="introHero" class="hero">
        <nav>
            <button class="nav-btn" onclick="openModal('login')">LOG IN</button>
            <button class="nav-btn" onclick="openModal('signup')">SIGN UP</button>
        </nav>
        <h1 style="letter-spacing: 15px;">QUANTIXAI</h1>
        <p>INTELLIGENCE REDEFINED</p>
    </div>

    <!-- MODAL -->
    <div id="modalOverlay" class="overlay">
        <div id="loginBox" class="form-box" style="display:none;">
            <h2>LOGIN</h2>
            <div id="loginError">Sorry, there is no such Account connected to QUANTIXAI.</div>
            <input type="text" id="userIn" placeholder="Username">
            <input type="password" id="passIn" placeholder="Password">
            <button class="submit-btn" onclick="attemptLogin()">AUTHENTICATE</button>
            <div style="margin-top:20px; font-size:12px; cursor:pointer;" onclick="closeModal()">CANCEL</div>
        </div>
        <div id="signupBox" class="form-box" style="display:none;">
            <h2>SIGN UP</h2>
            <div id="g_id_onload" data-client_id="YOUR_CLIENT_ID" data-callback="onGoogleSign"></div>
            <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large" data-width="320"></div>
            <div style="margin-top:20px; font-size:12px; cursor:pointer;" onclick="closeModal()">CANCEL</div>
        </div>
    </div>

    <!-- CHAT SECTION -->
    <div id="chatSection">
        <div style="display: flex; height: 100%;">
            <div class="sidebar">
                <h3 style="font-size: 0.8rem; letter-spacing: 2px; color: #444; margin-bottom: 20px;">CHATS</h3>
                <div class="recent-chats" id="recentChats">
                    <div class="chat-item">Welcome to Quantix</div>
                </div>
                <button class="new-chat-btn" onclick="clearChat()">+ New Chat</button>
            </div>
            <div class="chat-window">
                <div id="chatMessages">
                    <div class="msg ai-msg">Welcome to QUANTIXAI. How can I assist you today?</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="userChatInput" placeholder="Message QUANTIXAI..." onkeydown="if(event.key==='Enter') sendMessage()">
                </div>
            </div>
        </div>
    </div>

    <script>
        function openModal(type) {
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('loginBox').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('signupBox').style.display = type === 'signup' ? 'block' : 'none';
        }
        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

        function attemptLogin() {
            if (document.getElementById('userIn').value === "gandon" && document.getElementById('passIn').value === "kunel12345") {
                document.getElementById('introHero').style.display = 'none';
                document.getElementById('modalOverlay').style.display = 'none';
                document.getElementById('chatSection').style.display = 'block';
            } else { document.getElementById('loginError').style.display = 'block'; }
        }

        function sendMessage() {
            const input = document.getElementById('userChatInput');
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, 'user-msg');
            input.value = '';
            
            setTimeout(() => {
                let response = "I'm sorry, I don't understand that yet.";
                const lowText = text.toLowerCase();
                
                if (lowText.includes("name")) response = "My name is QUANTIXAI, your advanced computational assistant.";
                else if (lowText.includes("do")) response = "I assist with data analysis, answering questions, and solving mathematical problems.";
                else if (lowText.includes("hi") || lowText.includes("hello")) response = "Hello! How can I help you today?";
                else {
                    try { 
                        // Solve simple math like 5 + 5 or 10 * 2
                        const result = eval(text.replace(/[^-()\d/*+.]/g, ''));
                        if (!isNaN(result)) response = `The answer is ${result}.`;
                    } catch(e) {}
                }
                addMessage(response, 'ai-msg');
            }, 600);
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = `msg ${className}`;
            div.innerText = text;
            document.getElementById('chatMessages').appendChild(div);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }

        function clearChat() { document.getElementById('chatMessages').innerHTML = '<div class="msg ai-msg">New session started. How can I help?</div>'; }
        function onGoogleSign(r) { console.log("Auth success"); }
    </script>
</body>
</html>
