<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Project | Cinematic Portal</title>
    
    
    <script src="https://accounts.google.com" async defer></script>

    <style>
        /* 1. RESET & BASE STYLES */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #000; color: #fff; }

        /* 2. MOVING BACKGROUND (CINEMATIC GRADIENT) */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Animated background using moving gradients */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 3. TOP NAVIGATION */
        nav {
            position: absolute;
            top: 0; right: 0;
            padding: 40px;
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        /* 4. HOVER PHYSICS (SCALE & LIFT) */
        .nav-btn, .submit-btn, .close-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            /* Physics timing: cubic-bezier makes it feel "elastic" */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-btn:hover {
            transform: translateY(-5px) scale(1.05);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .nav-btn:active {
            transform: scale(0.95); /* Physics "squish" when clicked */
        }

        /* 5. HERO CONTENT */
        .hero h1 { font-size: 5rem; font-weight: 200; letter-spacing: 15px; margin-bottom: 10px; }
        .hero p { font-size: 1.2rem; opacity: 0.5; letter-spacing: 2px; }

        /* 6. MODALS & OVERLAYS */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .form-box {
            background: #0a0a0a;
            padding: 50px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            border: 1px solid #222;
        }

        h2 { margin-bottom: 30px; font-weight: 300; font-size: 1.5rem; letter-spacing: 2px; }
        
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            outline: none;
        }

        .submit-btn { width: 100%; background: #fff; color: #000; margin-top: 10px; }
        
        /* Center the Google Button Container */
        .social-wrapper {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .close-link { margin-top: 25px; display: block; color: #444; text-decoration: none; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hero">
        <nav>
            <button class="nav-btn" onclick="toggleModal('login')">LOG IN</button>
            <button class="nav-btn" onclick="toggleModal('signup')">SIGN UP</button>
        </nav>

        <h1>NEXUS AI</h1>
        <p>Intelligence redefined.</p>
    </div>

    <!-- MODAL OVERLAY -->
    <div id="modalOverlay" class="overlay">
        <!-- LOGIN SECTION -->
        <div id="loginBox" class="form-box" style="display: none;">
            <h2>AUTHENTICATE</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button class="submit-btn">ENTER</button>
            <span class="close-link" onclick="closeModal()">CLOSE</span>
        </div>

        <!-- SIGNUP SECTION -->
        <div id="signupBox" class="form-box" style="display: none;">
            <h2>CREATE ACCOUNT</h2>
            <div class="social-wrapper">
                <!-- FUNCTIONAL GOOGLE SIGN-IN BUTTON -->
                <div id="g_id_onload"
                     data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
                     data-context="signup"
                     data-ux_mode="popup"
                     data-callback="handleSignInResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signup_with" data-size="large" data-logo_alignment="left"></div>
                
                <p style="font-size: 10px; color: #555; margin: 10px 0;">ADDITIONAL OPTIONS</p>
                <button class="nav-btn" style="width:100%">Sign up with Apple</button>
                <button class="nav-btn" style="width:100%">Sign up with GitHub</button>
            </div>
            <span class="close-link" onclick="closeModal()">CLOSE</span>
        </div>
    </div>

    <script>
        // Modal Logic
        function toggleModal(type) {
            document.getElementById('modalOverlay').style.display = 'flex';
            if(type === 'login') {
                document.getElementById('loginBox').style.display = 'block';
                document.getElementById('signupBox').style.display = 'none';
            } else {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('signupBox').style.display = 'block';
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        // 3. Functional Google Sign-In Callback
        // This function runs when someone successfully logs in with Google.
        function handleSignInResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            alert("Google Authentication Successful! Token received.");
            // In a real app, you would send this token to your backend (Node.js, Firebase, etc.)
            closeModal();
        }
    </script>
</body>
</html>
