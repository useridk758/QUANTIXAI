<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTIXAI</title>
    <link rel="icon" type="image/png" href="<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS962PN1WyLaniO1vHeLqWZBbkodEh58zrBeA&amp;">
    
    
    <script src="https://accounts.google.com" async defer></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #000; color: #fff; }

        /* Smooth Transitions for Everything */
        * { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .hero {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(-45deg, #0d0221, #0f0c29, #24243e, #000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        nav { position: absolute; top: 0; right: 0; padding: 40px; display: flex; gap: 20px; z-index: 100; }
        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; padding: 12px 28px; border-radius: 8px; font-weight: 600;
            cursor: pointer;
        }
        .nav-btn:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.2); border-color: #fff; }

        .hero h1 { font-size: 5rem; font-weight: 200; letter-spacing: 15px; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .hero p { opacity: 0.5; letter-spacing: 5px; font-size: 1rem; margin-top: 10px; }

        /* Modals */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(30px);
            z-index: 1000; justify-content: center; align-items: center;
            opacity: 0; transform: scale(1.1);
        }
        .overlay.active { display: flex; opacity: 1; transform: scale(1); }

        .form-box { background: #050505; padding: 50px; border-radius: 24px; width: 420px; text-align: center; border: 1px solid #1a1a1a; }
        
        input {
            width: 100%; padding: 18px; margin-bottom: 15px; background: #0f0f0f;
            border: 1px solid #222; color: white; border-radius: 10px; outline: none;
        }
        input:focus { border-color: #444; background: #151515; }

        #loginError { color: #ff3333; font-size: 0.9rem; margin-bottom: 15px; display: none; font-weight: 500; }

        .submit-btn { width: 100%; background: #fff; color: #000; border: none; padding: 18px; font-weight: 800; border-radius: 10px; cursor: pointer; }
        .submit-btn:hover { transform: scale(1.02); background: #eee; }

        /* Sign Up Section Fixes */
        .social-container { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
        
        /* Forced Visibility for Google Button */
        #google-btn-container { width: 100% !important; min-height: 44px; margin-bottom: 5px; }

        .social-btn {
            width: 100%; padding: 14px; background: #111; border: 1px solid #333;
            color: #fff; border-radius: 10px; font-weight: 600; text-decoration: none;
            display: flex; align-items: center; justify-content: center;
        }
        .social-btn:hover { background: #222; border-color: #555; transform: translateY(-2px); }
        
        .close-btn { margin-top: 30px; color: #444; cursor: pointer; font-size: 12px; letter-spacing: 2px; }
        .close-btn:hover { color: #888; }
    </style>
</head>
<body>

    <div class="hero">
        <nav>
            <button class="nav-btn" onclick="openModal('login')">LOG IN</button>
            <button class="nav-btn" onclick="openModal('signup')">SIGN UP</button>
        </nav>
        <h1>QUANTIXAI</h1>
        <p>DEEP NEURAL ARCHITECTURE</p>
    </div>

    <div id="modalOverlay" class="overlay">
        <!-- Login Box -->
        <div id="loginBox" class="form-box" style="display:none;">
            <h2 style="margin-bottom:30px; letter-spacing:3px;">LOGIN</h2>
            <div id="loginError">Sorry, there is no such Account connected to QUANTIXAI.</div>
            <input type="text" id="userIn" placeholder="Username">
            <input type="password" id="passIn" placeholder="Password">
            <button class="submit-btn" onclick="attemptLogin()">AUTHENTICATE</button>
            <div class="close-btn" onclick="closeModal()">CANCEL</div>
        </div>

        <!-- Signup Box -->
        <div id="signupBox" class="form-box" style="display:none;">
            <h2 style="margin-bottom:30px; letter-spacing:3px;">SIGN UP</h2>
            <div class="social-container">
                <!-- 1. GOOGLE BUTTON (Guaranteed to render) -->
                <div id="google-btn-container">
                    <div id="g_id_onload" data-client_id="YOUR_CLIENT_ID" data-callback="onGoogleSign"></div>
                    <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large" data-width="320"></div>
                </div>

                <!-- 4. ACTUAL AUTH REDIRECTS -->
                <a href="https://appleid.apple.com" class="social-btn">
                    Continue with Apple
                </a>
                <a href="https://github.com" class="social-btn">
                    Continue with GitHub
                </a>
            </div>
            <div class="close-btn" onclick="closeModal()">CANCEL</div>
        </div>
    </div>

    <script>
        function openModal(type) {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.add('active');
            document.getElementById('loginBox').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('signupBox').style.display = type === 'signup' ? 'block' : 'none';
            document.getElementById('loginError').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // 3. HARDCODED ACCOUNT VALIDATION
        function attemptLogin() {
            const user = document.getElementById('userIn').value;
            const pass = document.getElementById('passIn').value;
            
            if (user === "gandon" && pass === "kunel12345") {
                alert("ACCESS GRANTED. Welcome to QUANTIXAI.");
                window.location.reload(); // Simulate login success
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function onGoogleSign(resp) { console.log("Google Auth Init..."); }
    </script>
</body>
</html>
