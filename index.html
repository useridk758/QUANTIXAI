<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 6. Text next to favicon -->
    <title>QUANTIXAI</title>
    <!-- 7. Favicon link -->
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS962PN1WyLaniO1vHeLqWZBbkodEh58zrBeA&s">
    
    
    <script src="https://accounts.google.com" async defer></script>

    <style>
        /* 1. Reset & Global Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #000; color: #fff; }

        /* 3. Universal Smooth Button Transitions */
        button, a, .nav-btn, .submit-btn, .social-btn {
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            outline: none;
        }

        /* Animated Cinematic Background */
        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0d0221, #0f0c29, #24243e, #000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Nav & Logo */
        nav { position: absolute; top: 0; right: 0; padding: 40px; display: flex; gap: 20px; z-index: 100; }
        .nav-btn {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; padding: 12px 25px; border-radius: 6px; font-weight: 600;
        }
        .nav-btn:hover { transform: translateY(-3px) scale(1.05); background: rgba(255, 255, 255, 0.2); }
        .nav-btn:active { transform: scale(0.95); }

        /* 5. AI Name Display */
        .hero h1 { font-size: 4.5rem; font-weight: 200; letter-spacing: 12px; }
        .hero p { opacity: 0.4; letter-spacing: 4px; font-size: 0.9rem; }

        /* Modals */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .form-box { background: #0a0a0a; padding: 40px; border-radius: 15px; width: 380px; text-align: center; border: 1px solid #222; }
        
        input {
            width: 100%; padding: 14px; margin-bottom: 12px; background: #111;
            border: 1px solid #333; color: white; border-radius: 5px;
        }

        /* 4. Error Message Styling */
        #loginError { color: #ff4d4d; font-size: 0.85rem; margin-bottom: 10px; display: none; }

        .submit-btn { width: 100%; background: #fff; color: #000; border: none; padding: 14px; font-weight: bold; border-radius: 5px; }
        .submit-btn:hover { background: #ccc; }

        /* 1 & 2. Social Button Container */
        .social-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .social-btn {
            width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333;
            color: #fff; border-radius: 5px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .social-btn:hover { background: #252525; border-color: #555; transform: scale(1.02); }
        
        .close-btn { margin-top: 20px; color: #555; cursor: pointer; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="hero">
        <nav>
            <button class="nav-btn" onclick="openModal('login')">LOG IN</button>
            <button class="nav-btn" onclick="openModal('signup')">SIGN UP</button>
        </nav>
        <h1>QUANTIXAI</h1>
        <p>THE FUTURE IS COMPUTATIONAL</p>
    </div>

    <div id="modalOverlay" class="overlay">
        <!-- Login Box -->
        <div id="loginBox" class="form-box" style="display:none;">
            <h2>AUTHENTICATE</h2>
            <div id="loginError">Sorry, there is no such Account connected to QUANTIXAI.</div>
            <input type="text" id="userIn" placeholder="Username">
            <input type="password" id="passIn" placeholder="Password">
            <button class="submit-btn" onclick="attemptLogin()">PROCEED</button>
            <div class="close-btn" onclick="closeModal()">BACK</div>
        </div>

        <!-- Signup Box -->
        <div id="signupBox" class="form-box" style="display:none;">
            <h2>JOIN QUANTIXAI</h2>
            <div class="social-container">
                <!-- 1. Google Official Button -->
                <div id="g_id_onload" data-client_id="YOUR_ID_HERE.apps.googleusercontent.com" data-callback="onGoogleSign"></div>
                <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-width="300"></div>

                <!-- 2. Functional Mock Social Buttons -->
                <button class="social-btn" onclick="socialAction('Apple')">Continue with Apple</button>
                <button class="social-btn" onclick="socialAction('GitHub')">Continue with GitHub</button>
            </div>
            <div class="close-btn" onclick="closeModal()">BACK</div>
        </div>
    </div>

    <script>
        function openModal(type) {
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('loginBox').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('signupBox').style.display = type === 'signup' ? 'block' : 'none';
            document.getElementById('loginError').style.display = 'none';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

        // 4. Mock Login Validation
        function attemptLogin() {
            const user = document.getElementById('userIn').value;
            const pass = document.getElementById('passIn').value;
            // Since there is no database yet, every entry shows the error
            if (user !== "admin" || pass !== "1234") {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        // 1 & 2. Social Actions
        function onGoogleSign(resp) { alert("Google connection initialized."); }
        function socialAction(provider) { alert("Connecting to " + provider + " servers..."); }
    </script>
</body>
</html>
