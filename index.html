<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTIXAI</title>
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --accent: #fff; --bg: #000; --sidebar: #080808; --border: #1a1a1a; --bezier: cubic-bezier(0.4, 0, 0.2, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.4s var(--bezier); }
        body, html { height: 100%; overflow: hidden; background: var(--bg); color: #fff; }

        /* INTRO SCREEN */
        .hero { height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(-45deg, #0d0221, #0f0c29, #24243e, #000); background-size: 400% 400%; animation: gradientBG 15s ease infinite; position: absolute; z-index: 100; opacity: 1; visibility: visible; }
        .hero.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); pointer-events: none; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* AUTH MODALS */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 1000; justify-content: center; align-items: center; opacity: 0; }
        .overlay.active { display: flex; opacity: 1; }
        .form-box { background: #050505; padding: 40px; border-radius: 20px; width: 380px; text-align: center; border: 1px solid var(--border); transform: translateY(20px); }
        .overlay.active .form-box { transform: translateY(0); }
        input { width: 100%; padding: 15px; margin-bottom: 12px; background: #0f0f0f; border: 1px solid #222; color: white; border-radius: 10px; outline: none; }
        .submit-btn { width: 100%; background: #fff; color: #000; border: none; padding: 15px; font-weight: 800; border-radius: 10px; cursor: pointer; }

        /* CHAT INTERFACE */
        #chatInterface { display: flex; height: 100vh; width: 100%; opacity: 0; transform: translateY(20px); pointer-events: none; }
        #chatInterface.active { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; z-index: 50; }
        .chat-list { flex: 1; overflow-y: auto; padding-right: 5px; margin-top: 20px; }
        
        /* 2. Sidebar New Box Styles */
        .chat-item { position: relative; padding: 12px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; background: transparent; display: flex; align-items: center; justify-content: space-between; border: 1px solid transparent; }
        .chat-item:hover, .chat-item.active { background: #111; border-color: #222; color: #fff; }
        .chat-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; font-size: 0.9rem; pointer-events: none; }
        .del-chat { color: #555; font-size: 1.2rem; opacity: 0; padding: 5px; }
        .chat-item:hover .del-chat { opacity: 1; }
        .del-chat:hover { color: #ff4d4d; }

        .new-chat-btn { background: #111; border: 1px solid #222; color: #fff; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 600; margin-top: auto; text-align: left; }
        .new-chat-btn:hover { background: #222; border-color: #444; transform: translateY(-2px); }

        .main-chat { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; }
        .messages { flex: 1; padding: 40px 15%; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; }
        .msg { max-width: 80%; padding: 16px 20px; border-radius: 15px; line-height: 1.6; opacity: 0; transform: translateY(10px); animation: fadeIn 0.4s forwards; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        .user-msg { align-self: flex-end; background: #fff; color: #000; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #111; border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        /* INPUT AREA */
        .input-area { padding: 20px 15% 40px; display: flex; gap: 15px; }
        #userInput { flex: 1; background: #0f0f0f; border: 1px solid #222; color: #fff; padding: 18px; border-radius: 12px; outline: none; }

        /* 1. CONFIRM POPUP */
        .confirm-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; opacity: 0; }
        .confirm-overlay.active { display: flex; opacity: 1; }
    </style>
</head>
<body>

    <div id="hero" class="hero">
        <nav style="position: absolute; top: 30px; right: 30px; display: flex; gap: 15px;">
            <button onclick="toggleModal('login')" style="background:transparent; color:#fff; border:1px solid #333; padding:10px 20px; border-radius:8px; cursor:pointer;">LOG IN</button>
            <button onclick="toggleModal('signup')" style="background:#fff; color:#000; border:none; padding:10px 22px; border-radius:8px; font-weight:bold; cursor:pointer;">SIGN UP</button>
        </nav>
        <h1 style="font-size: 5rem; letter-spacing: 20px; font-weight: 200;">QUANTIXAI</h1>
        <p style="opacity: 0.4; letter-spacing: 5px;">COMPUTATIONAL INTELLIGENCE</p>
    </div>

    <div id="modalOverlay" class="overlay">
        <div id="loginBox" class="form-box" style="display:none;">
            <h2>LOGIN</h2>
            <div id="loginError" style="color:#ff3333; display:none; margin-bottom:15px;">Invalid Credentials.</div>
            <input type="text" id="uIn" placeholder="Username">
            <input type="password" id="pIn" placeholder="Password">
            <button class="submit-btn" onclick="handleLogin()">AUTHENTICATE</button>
            <p onclick="toggleModal(null)" style="margin-top:20px; color:#555; cursor:pointer; font-size:12px;">BACK</p>
        </div>
        <div id="signupBox" class="form-box" style="display:none;">
            <h2>SIGN UP</h2>
            <div id="g_id_onload" data-client_id="CLIENT_ID" data-callback="onSignIn"></div>
            <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large"></div>
            <p onclick="toggleModal(null)" style="margin-top:20px; color:#555; cursor:pointer; font-size:12px;">BACK</p>
        </div>
    </div>

    <div id="chatInterface">
        <div class="sidebar">
            <h3 style="font-size: 0.7rem; color: #444; letter-spacing: 2px;">HISTORY</h3>
            <div class="chat-list" id="chatList"></div>
            <button class="new-chat-btn" onclick="promptNewChat()">+ New Chat</button>
        </div>
        <div class="main-chat">
            <div class="messages" id="msgContainer"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Message QUANTIXAI..." onkeydown="if(event.key==='Enter') send()">
            </div>
        </div>
    </div>

    <div id="confirmPopup" class="confirm-overlay">
        <div class="form-box" style="width: 320px;">
            <p style="margin-bottom:25px; font-weight:600;">Open a new chat?</p>
            <div style="display:flex; gap:12px;">
                <button class="submit-btn" onclick="createNewChat(true)">YES</button>
                <button class="submit-btn" style="background:#1a1a1a; color:#fff;" onclick="createNewChat(false)">NO</button>
            </div>
        </div>
    </div>

    <script>
        // 3. SAVING LOGIC (Using LocalStorage)
        let chats = JSON.parse(localStorage.getItem('quantix_history')) || [];
        let currentChatId = null;

        function toggleModal(type) {
            const over = document.getElementById('modalOverlay');
            if(!type) { over.classList.remove('active'); setTimeout(()=>over.style.display='none', 400); return; }
            over.style.display = 'flex';
            setTimeout(()=>over.classList.add('active'), 10);
            document.getElementById('loginBox').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('signupBox').style.display = type === 'signup' ? 'block' : 'none';
        }

        function handleLogin() {
            if(document.getElementById('uIn').value === "gandon" && document.getElementById('pIn').value === "kunel12345") {
                document.getElementById('hero').classList.add('hidden');
                toggleModal(null);
                setTimeout(() => {
                    document.getElementById('chatInterface').classList.add('active');
                    initChat();
                }, 600);
            } else { document.getElementById('loginError').style.display = 'block'; }
        }

        // 1. Confirm New Chat
        function promptNewChat() {
            const pop = document.getElementById('confirmPopup');
            pop.style.display = 'flex';
            setTimeout(()=>pop.classList.add('active'), 10);
        }

        // 2. Add New Box to Sidebar
        function createNewChat(confirm, silent=false) {
            const pop = document.getElementById('confirmPopup');
            pop.classList.remove('active');
            if(confirm) {
                const newId = Date.now();
                const newChat = { id: newId, title: "New Chat", history: [{t: "ai", m: "QUANTIXAI Online. Awaiting input."}] };
                chats.unshift(newChat);
                save();
                loadChat(newId);
                renderSidebar();
            }
            if(!silent) setTimeout(()=>pop.style.display='none', 400);
        }

        function renderSidebar() {
            const container = document.getElementById('chatList');
            container.innerHTML = chats.map(c => `
                <div class="chat-item ${c.id === currentChatId ? 'active' : ''}" onclick="loadChat(${c.id})">
                    <span>${c.title}</span>
                    <div class="del-chat" onclick="event.stopPropagation(); deleteChat(${c.id})">×</div>
                </div>
            `).join('');
        }

        function loadChat(id) {
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            const container = document.getElementById('msgContainer');
            container.style.opacity = 0;
            setTimeout(() => {
                container.innerHTML = chat.history.map(h => `<div class="msg ${h.t}-msg">${h.m}</div>`).join('');
                container.style.opacity = 1;
                container.scrollTop = container.scrollHeight;
                renderSidebar();
            }, 300);
        }

        function send() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;
            
            const chat = chats.find(c => c.id === currentChatId);
            chat.history.push({t: 'user', m: val});
            // Update title based on first question
            if(chat.title === "New Chat") chat.title = val.substring(0, 20) + "...";
            
            addMsgUI(val, 'user-msg');
            input.value = '';

            setTimeout(() => {
                let reply = "Processing...";
                const low = val.toLowerCase();
                if(low.includes("name")) reply = "I am QUANTIXAI.";
                else if(low.includes("do")) reply = "I manage computations and data streams.";
                else {
                    try { 
                        const result = eval(val.replace(/[^-()\d/*+.]/g, ''));
                        if(result !== undefined) reply = `Result: ${result}`;
                    } catch(e) {}
                }
                chat.history.push({t: 'ai', m: reply});
                addMsgUI(reply, 'ai-msg');
                save();
                renderSidebar();
            }, 800);
        }

        function addMsgUI(m, cls) {
            const d = document.createElement('div');
            d.className = `msg ${cls}`;
            d.innerText = m;
            document.getElementById('msgContainer').appendChild(d);
            document.getElementById('msgContainer').scrollTop = document.getElementById('msgContainer').scrollHeight;
        }

        function deleteChat(id) {
            chats = chats.filter(c => c.id !== id);
            save();
            if(currentChatId === id) initChat();
            else renderSidebar();
        }

        function save() { localStorage.setItem('quantix_history', JSON.stringify(chats)); }
        function initChat() { if(chats.length === 0) createNewChat(true, true); else loadChat(chats[0].id); renderSidebar(); }
        function onSignIn(r) { console.log(r); }
    </script>
</body>
</html>
