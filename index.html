<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cinematic Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #000; color: white; }

        /* Full-screen Cinematic Video Background */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.5); /* Darkens the video for better text visibility */
        }

        /* Top Navigation Bar */
        nav {
            position: absolute;
            top: 0; right: 0;
            padding: 30px 50px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 28px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s ease;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .nav-btn:hover { background: rgba(255, 255, 255, 0.25); border-color: #fff; }

        /* Main Intro Content */
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .hero h1 { font-size: 5rem; letter-spacing: 8px; margin-bottom: 20px; font-weight: 300; }
        .hero p { font-size: 1.4rem; opacity: 0.7; max-width: 600px; line-height: 1.6; }

        /* Overlay & Modals */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background: #111;
            padding: 50px;
            border-radius: 12px;
            width: 420px;
            text-align: center;
            border: 1px solid #333;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
        }

        h2 { margin-bottom: 30px; font-weight: 400; font-size: 1.8rem; }
        input {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .submit-btn:hover { background: #ddd; }

        /* Social Buttons for Signup */
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #222;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #444;
            font-weight: 500;
        }

        .social-btn:hover { background: #333; }

        .close-btn {
            margin-top: 30px;
            display: block;
            color: #666;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <!-- Cinematic Intro Video -->
    <video autoplay muted loop class="video-bg">
        <source src="https://assets.mixkit.co" type="video/mp4">
    </video>

    <!-- Top Navigation -->
    <nav>
        <button class="nav-btn" onclick="openModal('login')">Log In</button>
        <button class="nav-btn" onclick="openModal('signup')">Sign Up</button>
    </nav>

    <!-- Center Hero Screen -->
    <div class="hero">
        <h1>PROJECT AI</h1>
        <p>A new frontier in machine intelligence.</p>
    </div>

    <!-- Modal Overlay -->
    <div id="modalOverlay" class="overlay">
        <!-- Log In Form -->
        <div id="loginForm" class="form-container" style="display:none;">
            <h2>AUTHENTICATE</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button class="submit-btn">PROCEED</button>
            <span class="close-btn" onclick="closeModal()">CLOSE</span>
        </div>

        <!-- Sign Up Form -->
        <div id="signupForm" class="form-container" style="display:none;">
            <h2>JOIN THE NETWORK</h2>
            <div class="social-btn">Continue with Google</div>
            <div class="social-btn">Continue with Apple</div>
            <div class="social-btn">Continue with GitHub</div>
            <p style="margin-top: 20px; color: #555; font-size: 0.9rem;">— or sign up with email —</p>
            <span class="close-btn" onclick="closeModal()">CLOSE</span>
        </div>
    </div>

    <script>
        function openModal(type) {
            document.getElementById('modalOverlay').style.display = 'flex';
            if(type === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('signupForm').style.display = 'none';
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('signupForm').style.display = 'block';
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
